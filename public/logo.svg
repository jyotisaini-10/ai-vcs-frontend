<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle inner glow border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="3"/>

  <!-- Git branch node top -->
  <circle cx="256" cy="118" r="28" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="256" cy="118" r="16" fill="#1e0a4a"/>
  <circle cx="256" cy="118" r="7" fill="url(#glow)"/>

  <!-- Vertical stem -->
  <rect x="248" y="146" width="16" height="72" rx="8" fill="url(#glow)" opacity="0.9"/>

  <!-- Branch left node -->
  <circle cx="156" cy="310" r="28" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="156" cy="310" r="16" fill="#1e0a4a"/>
  <circle cx="156" cy="310" r="7" fill="url(#glow)"/>

  <!-- Branch right node -->
  <circle cx="356" cy="310" r="28" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="356" cy="310" r="16" fill="#1e0a4a"/>
  <circle cx="356" cy="310" r="7" fill="url(#glow)"/>

  <!-- Branch arms (the fork lines) -->
  <path d="M256 218 Q200 260 156 282" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M256 218 Q312 260 356 282" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- AI Spark / Lightning bolt in center -->
  <path d="M272 196 L242 248 H262 L236 304 L290 238 H268 L296 196 Z"
        fill="#f5f3ff" filter="url(#shadow)" opacity="0.95"/>

  <!-- Bottom: merge node -->
  <circle cx="256" cy="400" r="24" fill="url(#glow)" opacity="0.7"/>
  <circle cx="256" cy="400" r="12" fill="#1e0a4a"/>

  <!-- Merge lines from left/right nodes down -->
  <path d="M156 338 Q156 400 232 400" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M356 338 Q356 400 280 400" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.55"/>
</svg>
